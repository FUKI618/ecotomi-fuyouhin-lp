<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="40%" stop-color="#2c2420"/>
      <stop offset="100%" stop-color="#3a2a22"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a22"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </linearGradient>
    <linearGradient id="truckGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d45a2a"/>
      <stop offset="100%" stop-color="#e47040"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#d45a2a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2c2420" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background sky -->
  <rect width="1920" height="1080" fill="url(#skyGrad)"/>

  <!-- Subtle warm glow behind scene -->
  <rect width="1920" height="1080" fill="url(#glowCenter)"/>

  <!-- Osaka skyline silhouette - far background -->
  <g fill="#221a16" opacity="0.7">
    <!-- Abeno Harukas-like tall building -->
    <rect x="200" y="180" width="80" height="520" rx="2"/>
    <rect x="210" y="160" width="60" height="40" rx="1"/>
    <!-- Office buildings cluster left -->
    <rect x="80" y="350" width="100" height="350" rx="2"/>
    <rect x="120" y="310" width="50" height="390" rx="1"/>
    <rect x="300" y="280" width="90" height="420" rx="2"/>
    <rect x="410" y="320" width="70" height="380" rx="2"/>
    <!-- Tsutenkaku-like tower -->
    <rect x="530" y="200" width="30" height="500" rx="1"/>
    <rect x="515" y="190" width="60" height="30" rx="3"/>
    <rect x="520" y="350" width="50" height="60" rx="2"/>
    <!-- Central buildings -->
    <rect x="600" y="340" width="120" height="360" rx="2"/>
    <rect x="650" y="300" width="60" height="400" rx="1"/>
    <rect x="740" y="370" width="80" height="330" rx="2"/>
    <rect x="840" y="290" width="100" height="410" rx="2"/>
    <rect x="960" y="350" width="70" height="350" rx="2"/>
    <!-- Right side buildings -->
    <rect x="1050" y="310" width="90" height="390" rx="2"/>
    <rect x="1160" y="360" width="110" height="340" rx="2"/>
    <rect x="1290" y="280" width="80" height="420" rx="2"/>
    <rect x="1390" y="340" width="100" height="360" rx="2"/>
    <rect x="1510" y="300" width="70" height="400" rx="2"/>
    <rect x="1600" y="370" width="120" height="330" rx="2"/>
    <rect x="1740" y="320" width="90" height="380" rx="2"/>
    <rect x="1850" y="360" width="80" height="340" rx="2"/>
  </g>

  <!-- Bridge silhouette (Osaka-style arch bridge) -->
  <g fill="#2a1f1a" opacity="0.6">
    <path d="M0,700 Q480,620 960,700 Q1440,620 1920,700 L1920,720 Q1440,640 960,720 Q480,640 0,720 Z"/>
    <!-- Bridge pillars -->
    <rect x="320" y="680" width="12" height="60"/>
    <rect x="640" y="660" width="12" height="80"/>
    <rect x="960" y="680" width="12" height="60"/>
    <rect x="1280" y="660" width="12" height="80"/>
    <rect x="1600" y="680" width="12" height="60"/>
  </g>

  <!-- Ground plane -->
  <rect x="0" y="700" width="1920" height="380" fill="url(#groundGrad)"/>

  <!-- Truck in background (right side) -->
  <g transform="translate(1200, 520)">
    <!-- Truck body -->
    <rect x="0" y="60" width="380" height="160" rx="4" fill="#c04820" opacity="0.85"/>
    <!-- Truck cab -->
    <rect x="320" y="40" width="100" height="180" rx="6" fill="#b04018" opacity="0.85"/>
    <!-- Cab windshield -->
    <rect x="340" y="55" width="60" height="70" rx="3" fill="#1a1510" opacity="0.6"/>
    <!-- Truck brand stripe -->
    <rect x="10" y="100" width="300" height="40" rx="2" fill="url(#truckGrad)" opacity="0.7"/>
    <!-- エコ富 text on truck -->
    <text x="160" y="128" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.8">エコ富</text>
    <!-- Wheels -->
    <circle cx="80" cy="225" r="28" fill="#1a1510"/>
    <circle cx="80" cy="225" r="14" fill="#2c2420"/>
    <circle cx="300" cy="225" r="28" fill="#1a1510"/>
    <circle cx="300" cy="225" r="14" fill="#2c2420"/>
    <circle cx="370" cy="225" r="28" fill="#1a1510"/>
    <circle cx="370" cy="225" r="14" fill="#2c2420"/>
  </g>

  <!-- Worker silhouettes -->
  <!-- Worker 1 (front left) -->
  <g transform="translate(480, 420)" fill="#1a1510" opacity="0.9">
    <!-- Hard hat -->
    <ellipse cx="40" cy="0" rx="32" ry="14" fill="#d45a2a" opacity="0.6"/>
    <rect x="12" y="-8" width="56" height="14" rx="4" fill="#d45a2a" opacity="0.6"/>
    <!-- Head -->
    <circle cx="40" cy="20" r="22"/>
    <!-- Body (uniform) -->
    <rect x="12" y="40" width="56" height="120" rx="6"/>
    <!-- Arms -->
    <rect x="-10" y="50" width="24" height="90" rx="8"/>
    <rect x="66" y="45" width="24" height="95" rx="8"/>
    <!-- Legs -->
    <rect x="16" y="155" width="22" height="110" rx="6"/>
    <rect x="42" y="155" width="22" height="110" rx="6"/>
    <!-- Boots -->
    <rect x="12" y="255" width="28" height="18" rx="4"/>
    <rect x="40" y="255" width="28" height="18" rx="4"/>
  </g>

  <!-- Worker 2 (front center) -->
  <g transform="translate(720, 400)" fill="#1a1510" opacity="0.9">
    <!-- Hard hat -->
    <ellipse cx="40" cy="0" rx="34" ry="15" fill="#e47040" opacity="0.5"/>
    <rect x="10" y="-9" width="60" height="15" rx="4" fill="#e47040" opacity="0.5"/>
    <!-- Head -->
    <circle cx="40" cy="22" r="24"/>
    <!-- Body -->
    <rect x="10" y="44" width="60" height="130" rx="6"/>
    <!-- Arms (one raised, pointing) -->
    <rect x="-14" y="50" width="26" height="95" rx="8"/>
    <rect x="68" y="30" width="26" height="70" rx="8" transform="rotate(30, 80, 50)"/>
    <!-- Legs -->
    <rect x="14" y="168" width="24" height="120" rx="6"/>
    <rect x="42" y="168" width="24" height="120" rx="6"/>
    <!-- Boots -->
    <rect x="10" y="278" width="30" height="20" rx="4"/>
    <rect x="40" y="278" width="30" height="20" rx="4"/>
  </g>

  <!-- Worker 3 (front right) -->
  <g transform="translate(960, 430)" fill="#1a1510" opacity="0.9">
    <!-- Hard hat -->
    <ellipse cx="38" cy="0" rx="30" ry="13" fill="#d45a2a" opacity="0.6"/>
    <rect x="12" y="-7" width="52" height="13" rx="4" fill="#d45a2a" opacity="0.6"/>
    <!-- Head -->
    <circle cx="38" cy="18" r="21"/>
    <!-- Body -->
    <rect x="12" y="37" width="52" height="115" rx="6"/>
    <!-- Arms -->
    <rect x="-8" y="45" width="22" height="85" rx="8"/>
    <rect x="62" y="45" width="22" height="85" rx="8"/>
    <!-- Legs -->
    <rect x="16" y="147" width="20" height="105" rx="6"/>
    <rect x="40" y="147" width="20" height="105" rx="6"/>
    <!-- Boots -->
    <rect x="12" y="243" width="26" height="16" rx="4"/>
    <rect x="38" y="243" width="26" height="16" rx="4"/>
  </g>

  <!-- Worker 4 (back, between 1 and 2) -->
  <g transform="translate(600, 450)" fill="#1a1510" opacity="0.75" transform-origin="center">
    <!-- Hard hat -->
    <ellipse cx="35" cy="5" rx="28" ry="12" fill="#e47040" opacity="0.4"/>
    <rect x="10" y="-2" width="50" height="12" rx="3" fill="#e47040" opacity="0.4"/>
    <!-- Head -->
    <circle cx="35" cy="20" r="19"/>
    <!-- Body -->
    <rect x="12" y="37" width="46" height="100" rx="5"/>
    <!-- Arms -->
    <rect x="-6" y="44" width="20" height="75" rx="7"/>
    <rect x="56" y="44" width="20" height="75" rx="7"/>
    <!-- Legs -->
    <rect x="14" y="132" width="18" height="95" rx="5"/>
    <rect x="36" y="132" width="18" height="95" rx="5"/>
    <!-- Boots -->
    <rect x="10" y="220" width="24" height="14" rx="3"/>
    <rect x="34" y="220" width="24" height="14" rx="3"/>
  </g>

  <!-- Subtle terra cotta accent lines at bottom -->
  <line x1="0" y1="750" x2="1920" y2="750" stroke="#d45a2a" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="850" x2="1920" y2="850" stroke="#e47040" stroke-width="0.5" opacity="0.1"/>

  <!-- Dark overlay for use as background -->
  <rect width="1920" height="1080" fill="#1a1510" opacity="0.3"/>
</svg>