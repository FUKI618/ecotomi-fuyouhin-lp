<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Sky gradient - deep night with green/gold tint -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f0a"/>
      <stop offset="30%" stop-color="#121a14"/>
      <stop offset="60%" stop-color="#1a2218"/>
      <stop offset="100%" stop-color="#1e2820"/>
    </linearGradient>
    <!-- City glow -->
    <radialGradient id="cityglow" cx="60%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#3a8c4a" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#f0c850" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <!-- Water reflection gradient -->
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a1e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a120c"/>
    </linearGradient>
    <!-- Bokeh filter -->
    <filter id="bokeh-blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="bokeh-blur-lg">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- Building window pattern -->
    <pattern id="windows" x="0" y="0" width="12" height="16" patternUnits="userSpaceOnUse">
      <rect width="8" height="10" fill="#f0c850" opacity="0.15" rx="1"/>
    </pattern>
    <pattern id="windows-bright" x="0" y="0" width="12" height="16" patternUnits="userSpaceOnUse">
      <rect width="8" height="10" fill="#f0c850" opacity="0.35" rx="1"/>
    </pattern>
  </defs>

  <!-- Base sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Atmospheric haze layers -->
  <rect width="1920" height="1080" fill="url(#cityglow)"/>
  <ellipse cx="1300" cy="500" rx="800" ry="400" fill="#3a8c4a" opacity="0.04"/>
  <ellipse cx="600" cy="600" rx="600" ry="300" fill="#f0c850" opacity="0.02"/>

  <!-- Far background - distant city silhouette -->
  <g opacity="0.3">
    <rect x="800" y="340" width="35" height="200" fill="#1a2a1e" rx="2"/>
    <rect x="850" y="380" width="25" height="160" fill="#182618" rx="2"/>
    <rect x="890" y="360" width="30" height="180" fill="#1a2a1e" rx="2"/>
    <rect x="940" y="390" width="40" height="150" fill="#182618" rx="1"/>
    <rect x="1000" y="370" width="28" height="170" fill="#1a2a1e" rx="2"/>
    <rect x="1040" y="400" width="35" height="140" fill="#182618" rx="1"/>
    <rect x="1090" y="350" width="22" height="190" fill="#1a2a1e" rx="2"/>
    <rect x="1130" y="410" width="45" height="130" fill="#182618" rx="1"/>
    <rect x="1190" y="380" width="30" height="160" fill="#1a2a1e" rx="2"/>
    <rect x="700" y="400" width="50" height="140" fill="#182618" rx="1"/>
    <rect x="760" y="370" width="28" height="170" fill="#1a2a1e" rx="2"/>
    <rect x="1240" y="360" width="38" height="180" fill="#182618" rx="2"/>
    <rect x="1290" y="390" width="25" height="150" fill="#1a2a1e" rx="1"/>
    <rect x="1330" y="410" width="42" height="130" fill="#182618" rx="2"/>
    <rect x="650" y="420" width="35" height="120" fill="#1a2a1e" rx="1"/>
  </g>

  <!-- Mid-ground buildings with windows -->
  <!-- Abeno Harukas style tall building -->
  <g>
    <rect x="1150" y="180" width="70" height="380" fill="#1e3020" rx="3"/>
    <rect x="1155" y="185" width="60" height="370" fill="url(#windows)" rx="2"/>
    <rect x="1155" y="180" width="60" height="8" fill="#3a8c4a" opacity="0.2"/>
    <!-- Antenna -->
    <rect x="1183" y="140" width="4" height="40" fill="#2a3a2c"/>
    <circle cx="1185" cy="138" r="3" fill="#f0c850" opacity="0.6"/>
  </g>

  <!-- Second tall building -->
  <g>
    <rect x="1050" y="250" width="55" height="310" fill="#1c2c1e" rx="2"/>
    <rect x="1055" y="255" width="45" height="300" fill="url(#windows)" rx="1"/>
  </g>

  <!-- Wide office building -->
  <g>
    <rect x="1240" y="320" width="100" height="240" fill="#1e2e20" rx="2"/>
    <rect x="1245" y="325" width="90" height="230" fill="url(#windows-bright)" rx="1"/>
    <rect x="1240" y="320" width="100" height="6" fill="#3a8c4a" opacity="0.15"/>
  </g>

  <!-- Tsutenkaku tower - iconic -->
  <g transform="translate(1420, 160)">
    <rect x="-5" y="0" width="10" height="30" fill="#2a3c2c"/>
    <rect x="-20" y="30" width="40" height="60" fill="#222e24" rx="3"/>
    <rect x="-25" y="28" width="50" height="8" fill="#2a3c2c" rx="2"/>
    <!-- Observation deck glow -->
    <ellipse cx="0" cy="55" rx="22" ry="12" fill="#f0c850" opacity="0.08" filter="url(#bokeh-blur)"/>
    <rect x="-15" y="90" width="30" height="30" fill="#242e26"/>
    <rect x="-12" y="120" width="24" height="200" fill="#222e24"/>
    <rect x="-18" y="118" width="36" height="6" fill="#2a3c2c" rx="2"/>
    <!-- Tower lights -->
    <circle cx="-12" cy="50" r="2" fill="#3a8c4a" opacity="0.5"/>
    <circle cx="12" cy="50" r="2" fill="#3a8c4a" opacity="0.5"/>
    <circle cx="0" cy="35" r="3" fill="#f0c850" opacity="0.4"/>
  </g>

  <!-- Left side buildings -->
  <g>
    <rect x="500" y="350" width="80" height="210" fill="#1c2c1e" rx="2"/>
    <rect x="505" y="355" width="70" height="200" fill="url(#windows)" rx="1"/>
    <rect x="600" y="300" width="60" height="260" fill="#1e2e20" rx="2"/>
    <rect x="605" y="305" width="50" height="250" fill="url(#windows)" rx="1"/>
    <rect x="400" y="380" width="70" height="180" fill="#1a2a1c" rx="2"/>
    <rect x="405" y="385" width="60" height="170" fill="url(#windows)" rx="1"/>
    <rect x="300" y="410" width="55" height="150" fill="#1c2c1e" rx="2"/>
  </g>

  <!-- Osaka Castle silhouette - far left -->
  <g transform="translate(200, 320)" opacity="0.35">
    <rect x="-30" y="60" width="60" height="50" fill="#1e2e20"/>
    <rect x="-38" y="52" width="76" height="12" fill="#1e2e20"/>
    <rect x="-22" y="25" width="44" height="30" fill="#1e2e20"/>
    <rect x="-28" y="18" width="56" height="10" fill="#1e2e20"/>
    <polygon points="-25,18 0,0 25,18" fill="#1e2e20"/>
    <rect x="-2" y="-12" width="4" height="14" fill="#1e2e20"/>
    <!-- Castle light -->
    <ellipse cx="0" cy="40" rx="35" ry="20" fill="#f0c850" opacity="0.04" filter="url(#bokeh-blur)"/>
  </g>

  <!-- Ground plane -->
  <rect x="0" y="560" width="1920" height="520" fill="#141e16"/>

  <!-- Road surface -->
  <rect x="0" y="600" width="1920" height="200" fill="#121c14"/>
  <!-- Road markings -->
  <g opacity="0.2">
    <rect x="80" y="698" width="80" height="4" fill="#fff" rx="2"/>
    <rect x="280" y="698" width="80" height="4" fill="#fff" rx="2"/>
    <rect x="480" y="698" width="80" height="4" fill="#fff" rx="2"/>
    <rect x="680" y="698" width="80" height="4" fill="#fff" rx="2"/>
    <rect x="880" y="698" width="80" height="4" fill="#fff" rx="2"/>
    <rect x="1080" y="698" width="80" height="4" fill="#fff" rx="2"/>
    <rect x="1280" y="698" width="80" height="4" fill="#fff" rx="2"/>
    <rect x="1480" y="698" width="80" height="4" fill="#fff" rx="2"/>
    <rect x="1680" y="698" width="80" height="4" fill="#fff" rx="2"/>
  </g>
  <!-- Road edge lines -->
  <rect x="0" y="600" width="1920" height="2" fill="#3a8c4a" opacity="0.1"/>
  <rect x="0" y="800" width="1920" height="2" fill="#3a8c4a" opacity="0.08"/>

  <!-- ═══ BOKEH LIGHTS - the magic ═══ -->
  <!-- Large distant bokeh -->
  <g filter="url(#bokeh-blur-lg)">
    <circle cx="300" cy="420" r="12" fill="#f0c850" opacity="0.2"/>
    <circle cx="550" cy="380" r="10" fill="#3a8c4a" opacity="0.18"/>
    <circle cx="780" cy="440" r="14" fill="#f0c850" opacity="0.15"/>
    <circle cx="1000" cy="400" r="11" fill="#4a9c5a" opacity="0.2"/>
    <circle cx="1350" cy="430" r="13" fill="#f0c850" opacity="0.18"/>
    <circle cx="1550" cy="390" r="10" fill="#3a8c4a" opacity="0.15"/>
    <circle cx="1700" cy="450" r="12" fill="#f0c850" opacity="0.12"/>
  </g>

  <!-- Medium bokeh -->
  <g filter="url(#bokeh-blur)">
    <circle cx="150" cy="480" r="8" fill="#f0c850" opacity="0.3"/>
    <circle cx="400" cy="500" r="6" fill="#3a8c4a" opacity="0.25"/>
    <circle cx="650" cy="470" r="9" fill="#f0c850" opacity="0.2"/>
    <circle cx="850" cy="510" r="7" fill="#4a9c5a" opacity="0.25"/>
    <circle cx="1100" cy="480" r="8" fill="#f0c850" opacity="0.22"/>
    <circle cx="1300" cy="500" r="6" fill="#3a8c4a" opacity="0.2"/>
    <circle cx="1500" cy="470" r="9" fill="#f0c850" opacity="0.18"/>
    <circle cx="1750" cy="490" r="7" fill="#4a9c5a" opacity="0.2"/>
    <circle cx="250" cy="520" r="5" fill="#e8962e" opacity="0.25"/>
    <circle cx="950" cy="530" r="6" fill="#e8962e" opacity="0.2"/>
    <circle cx="1600" cy="520" r="5" fill="#e8962e" opacity="0.22"/>
  </g>

  <!-- Small sharp bokeh dots -->
  <g opacity="0.5">
    <circle cx="120" cy="450" r="2" fill="#f0c850"/>
    <circle cx="280" cy="470" r="1.5" fill="#fff"/>
    <circle cx="370" cy="435" r="2" fill="#f0c850"/>
    <circle cx="520" cy="490" r="1.5" fill="#3a8c4a"/>
    <circle cx="680" cy="445" r="2" fill="#f0c850"/>
    <circle cx="750" cy="505" r="1.5" fill="#fff"/>
    <circle cx="920" cy="460" r="2" fill="#f0c850"/>
    <circle cx="1050" cy="500" r="1.5" fill="#3a8c4a"/>
    <circle cx="1180" cy="445" r="2" fill="#f0c850"/>
    <circle cx="1280" cy="510" r="1.5" fill="#fff"/>
    <circle cx="1380" cy="455" r="2" fill="#f0c850"/>
    <circle cx="1480" cy="485" r="1.5" fill="#3a8c4a"/>
    <circle cx="1620" cy="440" r="2" fill="#f0c850"/>
    <circle cx="1750" cy="505" r="1.5" fill="#f0c850"/>
    <circle cx="1850" cy="460" r="2" fill="#fff"/>
  </g>

  <!-- Foreground bokeh (close, large, very blurred) -->
  <g filter="url(#bokeh-blur-lg)">
    <circle cx="100" cy="700" r="25" fill="#3a8c4a" opacity="0.06"/>
    <circle cx="1800" cy="650" r="30" fill="#f0c850" opacity="0.05"/>
    <circle cx="400" cy="750" r="20" fill="#f0c850" opacity="0.04"/>
    <circle cx="1500" cy="720" r="22" fill="#3a8c4a" opacity="0.05"/>
  </g>

  <!-- ═══ TRUCK - polished ═══ -->
  <g transform="translate(1050, 540)">
    <!-- Truck shadow -->
    <ellipse cx="180" cy="230" rx="200" ry="15" fill="#000" opacity="0.3" filter="url(#bokeh-blur)"/>

    <!-- Truck body -->
    <rect x="0" y="20" width="240" height="150" rx="8" fill="#2a5a32"/>
    <rect x="0" y="20" width="240" height="150" rx="8" fill="url(#windows)" opacity="0"/>
    <!-- Body gradient overlay -->
    <rect x="0" y="20" width="240" height="75" rx="8" fill="#3a8c4a" opacity="0.15"/>
    <!-- Body border -->
    <rect x="2" y="22" width="236" height="146" rx="7" fill="none" stroke="#4a9c5a" stroke-width="1.5" opacity="0.3"/>

    <!-- Gold stripe -->
    <rect x="0" y="90" width="240" height="4" fill="#f0c850" opacity="0.6"/>

    <!-- Company branding on truck -->
    <text x="120" y="65" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN',sans-serif" font-weight="900" font-size="32" fill="#fff" opacity="0.95">エコ富</text>
    <text x="120" y="115" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN',sans-serif" font-weight="700" font-size="14" fill="#f0c850" opacity="0.8">不用品回収・出張買取</text>
    <text x="120" y="145" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN',sans-serif" font-weight="500" font-size="12" fill="#fff" opacity="0.5">072-600-0259</text>

    <!-- Cabin -->
    <rect x="240" y="50" width="95" height="120" rx="6" fill="#224a28"/>
    <rect x="242" y="52" width="91" height="116" rx="5" fill="none" stroke="#4a9c5a" stroke-width="1" opacity="0.2"/>
    <!-- Windshield -->
    <rect x="252" y="62" width="36" height="50" rx="4" fill="#0a1a0e" opacity="0.8"/>
    <rect x="252" y="62" width="36" height="50" rx="4" fill="none" stroke="#3a8c4a" stroke-width="0.5" opacity="0.3"/>
    <!-- Side window -->
    <rect x="294" y="62" width="30" height="50" rx="4" fill="#0a1a0e" opacity="0.8"/>
    <!-- Window reflection -->
    <rect x="255" y="65" width="8" height="30" rx="2" fill="#fff" opacity="0.06" transform="skewX(-5)"/>
    <!-- Headlight -->
    <circle cx="338" cy="130" r="6" fill="#f0c850" opacity="0.7"/>
    <circle cx="338" cy="130" r="12" fill="#f0c850" opacity="0.1" filter="url(#soft-glow)"/>

    <!-- Wheels -->
    <g>
      <circle cx="55" cy="175" r="28" fill="#0a0f0a"/>
      <circle cx="55" cy="175" r="22" fill="#1a1a1a"/>
      <circle cx="55" cy="175" r="18" fill="#222"/>
      <circle cx="55" cy="175" r="5" fill="#333"/>
      <circle cx="55" cy="175" r="2" fill="#444"/>
    </g>
    <g>
      <circle cx="200" cy="175" r="28" fill="#0a0f0a"/>
      <circle cx="200" cy="175" r="22" fill="#1a1a1a"/>
      <circle cx="200" cy="175" r="18" fill="#222"/>
      <circle cx="200" cy="175" r="5" fill="#333"/>
      <circle cx="200" cy="175" r="2" fill="#444"/>
    </g>
    <g>
      <circle cx="300" cy="175" r="28" fill="#0a0f0a"/>
      <circle cx="300" cy="175" r="22" fill="#1a1a1a"/>
      <circle cx="300" cy="175" r="18" fill="#222"/>
      <circle cx="300" cy="175" r="5" fill="#333"/>
      <circle cx="300" cy="175" r="2" fill="#444"/>
    </g>

    <!-- Headlight beam -->
    <polygon points="338,124 500,80 500,160 338,136" fill="#f0c850" opacity="0.03"/>
  </g>

  <!-- ═══ WATER REFLECTION AREA ═══ -->
  <rect x="0" y="820" width="1920" height="260" fill="url(#water)"/>
  <!-- Building reflections in water (inverted, blurred) -->
  <g opacity="0.08" filter="url(#bokeh-blur)" transform="translate(0,1080) scale(1,-0.4)">
    <rect x="1150" y="180" width="70" height="380" fill="#3a8c4a"/>
    <rect x="1050" y="250" width="55" height="310" fill="#3a8c4a"/>
    <rect x="1240" y="320" width="100" height="240" fill="#3a8c4a"/>
  </g>
  <!-- Water shimmer lines -->
  <g opacity="0.06">
    <rect x="100" y="850" width="300" height="1" fill="#f0c850" rx="1"/>
    <rect x="500" y="870" width="250" height="1" fill="#3a8c4a" rx="1"/>
    <rect x="900" y="855" width="200" height="1" fill="#f0c850" rx="1"/>
    <rect x="1200" y="880" width="350" height="1" fill="#3a8c4a" rx="1"/>
    <rect x="1650" y="860" width="200" height="1" fill="#f0c850" rx="1"/>
    <rect x="200" y="900" width="180" height="1" fill="#3a8c4a" rx="1"/>
    <rect x="700" y="910" width="280" height="1" fill="#f0c850" rx="1"/>
    <rect x="1100" y="920" width="220" height="1" fill="#3a8c4a" rx="1"/>
    <rect x="1500" y="905" width="300" height="1" fill="#f0c850" rx="1"/>
  </g>

  <!-- Stars -->
  <g opacity="0.4">
    <circle cx="150" cy="60" r="1" fill="#fff"/>
    <circle cx="380" cy="100" r="0.8" fill="#fff"/>
    <circle cx="620" cy="40" r="1.2" fill="#fff"/>
    <circle cx="850" cy="80" r="0.8" fill="#fff"/>
    <circle cx="1100" cy="50" r="1" fill="#fff"/>
    <circle cx="1350" cy="90" r="0.8" fill="#fff"/>
    <circle cx="1600" cy="55" r="1" fill="#fff"/>
    <circle cx="1800" cy="75" r="0.8" fill="#fff"/>
    <circle cx="250" cy="140" r="0.6" fill="#fff"/>
    <circle cx="500" cy="120" r="0.6" fill="#fff"/>
    <circle cx="1450" cy="130" r="0.6" fill="#fff"/>
    <circle cx="1700" cy="110" r="0.6" fill="#fff"/>
  </g>

  <!-- Top vignette -->
  <rect width="1920" height="200" fill="url(#sky)" opacity="0.5"/>
  <!-- Bottom vignette -->
  <rect x="0" y="900" width="1920" height="180" fill="#0a0f0a" opacity="0.6"/>
</svg>
