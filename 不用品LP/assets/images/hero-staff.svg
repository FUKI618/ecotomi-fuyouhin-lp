      <rect x="-25" y="115" width="7" height="5" opacity="0.6" rx="1"/><rect x="-12" y="115" width="7" height="5" opacity="0.7" rx="1"/><rect x="14" y="115" width="7" height="5" opacity="0.8" rx="1"/>
