<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3525"/>
      <stop offset="40%" stop-color="#2a4a30"/>
      <stop offset="70%" stop-color="#355a3a"/>
      <stop offset="100%" stop-color="#3a6240"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#5ac06a" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#f0c850" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#f0c850" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="transparent"/>
