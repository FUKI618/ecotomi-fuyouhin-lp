<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c2420"/>
      <stop offset="100%" stop-color="#3a2a22"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d45a2a"/>
      <stop offset="100%" stop-color="#e09040"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d45a2a"/>
      <stop offset="100%" stop-color="#c04820"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle pattern overlay -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#logoGrad)"/>

  <!-- Logo circle -->
  <g transform="translate(160, 200)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="100" fill="url(#logoGrad)"/>
    <circle cx="0" cy="0" r="92" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <text x="0" y="18" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="56" font-weight="900" fill="#fff" text-anchor="middle">エコ富</text>
  </g>

  <!-- Main title -->
  <g filter="url(#textShadow)">
    <text x="380" y="170" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="84" font-weight="900" fill="#fff">エコ富</text>
  </g>

  <!-- Subtitle -->
  <text x="380" y="230" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="32" font-weight="600" fill="#e0c8b0">大阪の不用品回収・出張買取</text>

  <!-- Divider line -->
  <line x1="380" y1="255" x2="750" y2="255" stroke="url(#logoGrad)" stroke-width="3" opacity="0.6"/>

  <!-- Badges row -->
  <!-- Badge 1: 相見積もり歓迎 -->
  <g transform="translate(320, 290)">
    <rect x="0" y="0" width="220" height="60" rx="30" fill="url(#badgeGrad)" filter="url(#shadow)"/>
    <text x="110" y="38" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle">相見積もり歓迎</text>
  </g>

  <!-- Badge 2: 出張費0円 -->
  <g transform="translate(565, 290)">
    <rect x="0" y="0" width="180" height="60" rx="30" fill="url(#badgeGrad)" filter="url(#shadow)"/>
    <text x="90" y="38" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle">出張費0円</text>
  </g>

  <!-- Badge 3: 最短30分 -->
  <g transform="translate(770, 290)">
    <rect x="0" y="0" width="180" height="60" rx="30" fill="url(#badgeGrad)" filter="url(#shadow)"/>
    <text x="90" y="38" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle">最短30分</text>
  </g>

  <!-- Phone number -->
  <g transform="translate(380, 400)">
    <text x="0" y="0" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="18" font-weight="500" fill="#e0c8b0" opacity="0.8">お電話でのお見積もり・ご相談</text>
    <text x="0" y="48" font-family="'Arial', 'Helvetica', sans-serif" font-size="44" font-weight="900" fill="#fff" letter-spacing="2">
      <tspan fill="#e47040">TEL </tspan>0120-XXX-XXXX
    </text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="560" width="1200" height="70" fill="#1a1510" opacity="0.5"/>
  <text x="600" y="602" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="18" font-weight="500" fill="#e0c8b0" text-anchor="middle" opacity="0.7">年中無休 | 即日対応 | 大阪全域対応</text>

  <!-- Decorative accent bar bottom -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#logoGrad)"/>
</svg>